# Publishes @meewmeew/mcp when a version tag is pushed (e.g. v0.1.0).
# Add repository secret NPM_TOKEN: npm "Automation" token or granular token with publish.

name: MCP server

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build @meewmeew/mcp
        run: pnpm exec turbo run build test lint check-types --filter=@meewmeew/mcp

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Align package version with git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p='apps/server/package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');" "$TAG"

      - name: Build
        run: pnpm exec turbo run build --filter=@meewmeew/mcp

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @meewmeew/mcp publish --access public --no-git-checks
