# Bump version in root package.json on main, then push — CI syncs apps/server, creates tag vX.Y.Z if missing, publishes @meewmeew/mcp.
# Requires repository secret NPM_TOKEN (npm Automation or granular publish token).

name: MCP server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build @meewmeew/mcp
        run: pnpm exec turbo run build test lint check-types --filter=@meewmeew/mcp

  publish:
    needs: build
    if: needs.build.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Sync apps/server version from root package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs'); const v=process.argv[1]; const p='apps/server/package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=v; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');" "$VERSION"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create git tag if missing
        run: |
          TAG="v${RELEASE_VERSION}"
          git fetch origin --tags
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Build
        run: pnpm exec turbo run build --filter=@meewmeew/mcp

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @meewmeew/mcp publish --access public --no-git-checks
